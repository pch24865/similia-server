spring:
  application:
    name: similia

  profiles:
    active: dev
    group:
      "dev": "dev"
      "stage": "stage"
      "prod": "prod"

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

server:
  port: 8080
  servlet:
    context-path: /api

# ─────────────────────────────────────────────
# 보안 및 공통 설정
# ─────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:c2ltaWxpYS1zZWNyZXQta2V5LXRlc3QtdmFsdWUtc2ltaWxpYS1zZWNyZXQta2V5LXRlc3QtdmFsdWU=}
  access-token-validity-in-milliseconds: 1800000 # 30분
  refresh-token-validity-in-milliseconds: 604800000 # 7일

ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:8000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
