<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Similia Image Upload</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        .navbar {
            width: 100%;
            background: #2d7ef7;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
        }

        .nav-left {
            font-size: 18px;
            font-weight: bold;
        }

        .nav-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-btn {
            background: white;
            color: #2d7ef7;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn:hover {
            background: #eaf1ff;
        }

        .main {
            min-height: calc(100vh - 72px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .form-card {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-card h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        input[type="file"] {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
        }

        .submit-btn {
            background: #2d7ef7;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #1b63d1;
        }
        
        .result-box {
            margin-top: 20px;
            padding: 20px;
            background: #fdfdfd;
            border: 1px solid #ddd;
            border-radius: 8px;
            word-wrap: break-word;
        }

        #previewImage {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left" id="welcomeText">Similia - Image Upload</div>

    <div class="nav-right">
        <button class="nav-btn" onclick="goHome()">홈</button>
        <button class="nav-btn hidden" id="logoutBtn" onclick="logout()">로그아웃</button>
    </div>
</nav>

<main class="main">
    <section class="form-card">
        <h1>추천용 이미지 업로드</h1>
        <p style="text-align: center; color: #666; font-size: 14px; margin-top: -10px;">여행지 사진을 업로드해주세요.</p>

        <form id="uploadForm">
            <input type="file" id="imageFile" accept="image/*" required />
            <button type="submit" class="submit-btn" id="uploadBtn">업로드 하기</button>
        </form>

        <div id="resultContainer" class="result-box hidden">
            <h4>업로드 완료!</h4>
            <pre id="jsonResult" style="font-size: 12px; background: #eee; padding: 10px;"></pre>
            <p><strong>아래는 저장된 이미지 원본입니다:</strong></p>
            <img id="previewImage" src="" alt="Uploaded Image" />
        </div>
    </section>
</main>

<script>
    window.onload = function () {
        checkAuth();
    };

    function checkAuth() {
        const token = localStorage.getItem('accessToken');
        if (!token) {
            alert('로그인이 필요한 서비스입니다.');
            location.href = '/login.html';
            return;
        }
        document.getElementById('logoutBtn').classList.remove('hidden');
    }

    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const fileInput = document.getElementById('imageFile');
        if (fileInput.files.length === 0) {
            alert("이미지를 선택해주세요!");
            return;
        }

        const file = fileInput.files[0];
        const token = localStorage.getItem('accessToken');

        // FormData 활용하기 (Content-Type 자동 설정되므로 fetch 헤더에 설정하지 않습니다)
        const formData = new FormData();
        formData.append("file", file);

        const btn = document.getElementById('uploadBtn');
        btn.innerText = "업로드 중...";
        btn.disabled = true;

        try {
            const response = await fetch('/images', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token
                },
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                
                // 결과창 보여주기
                document.getElementById('resultContainer').classList.remove('hidden');
                document.getElementById('jsonResult').innerText = JSON.stringify(data, null, 2);
                
                // GET 조회 API를 이용해 방금 가져온 이미지를 img src에 곧바로 세팅 (인증 불필요하므로 그냥 세팅)
                document.getElementById('previewImage').src = `/images/${data.id}`;
                
                alert('업로드 성공!');
            } else {
                const err = await response.json();
                alert(`업로드 실패: ${err.message || '알 수 없는 에러'}`);
            }
        } catch (error) {
            console.error(error);
            alert("요청 중 오류가 발생했습니다.");
        } finally {
            btn.innerText = "업로드 하기";
            btn.disabled = false;
        }
    });

    function goHome() {
        location.href = '/index.html';
    }

    async function logout() {
        const token = localStorage.getItem('accessToken');
        if (token) {
            await fetch('/auth/tokens', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
            localStorage.removeItem('accessToken');
        }
        location.href = '/index.html';
    }
</script>
</body>
</html>
