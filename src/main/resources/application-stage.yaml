spring:
  datasource:
    # 스테이징 환경용 RDS 정보 (환경변수 주입)
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update # 개발 단계이므로 DB 컬럼 자동 추가 허용 (원래는 validate)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.noplay.similia: INFO
