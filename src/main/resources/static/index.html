<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Similia Home</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        .navbar {
            width: 100%;
            background: #2d7ef7;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
        }

        .nav-left {
            font-size: 18px;
            font-weight: bold;
        }

        .nav-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-btn {
            background: white;
            color: #2d7ef7;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn:hover {
            background: #eaf1ff;
        }

        .main {
            min-height: calc(100vh - 72px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .home-card {
            width: 100%;
            max-width: 720px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 48px 32px;
            text-align: center;
        }

        .home-card h1 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 32px;
        }

        .home-card p {
            margin: 0;
            font-size: 17px;
            color: #555;
            line-height: 1.6;
        }

        .home-card .sub-text {
            margin-top: 20px;
            color: #777;
            font-size: 15px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left" id="welcomeText">Similia</div>

    <div class="nav-right">
        <button class="nav-btn" onclick="goHome()">홈</button>
        <button class="nav-btn" id="loginBtn" onclick="goLogin()">로그인</button>
        <button class="nav-btn hidden" id="editBtn" onclick="goEdit()">회원정보 수정</button>
        <button class="nav-btn hidden" id="logoutBtn" onclick="logout()">로그아웃</button>
    </div>
</nav>

<main class="main">
    <section class="home-card">
        <h1>Similia 홈</h1>
        <p>로그인 상태에 따라 상단 네비게이션이 바뀌는 메인 페이지입니다.</p>
        <p class="sub-text">로그인하면 닉네임 인사말과 회원정보 수정, 로그아웃 메뉴가 표시됩니다.</p>
    </section>
</main>

<script>
    window.onload = function () {
        checkLoginStatus();
    };

    async function checkLoginStatus() {
        try {
            const response = await fetch('/members/profile', {
                method: 'GET',
                credentials: 'include'
            });

            if (response.ok) {
                const member = await response.json();
                renderLoggedInNav(member);
            } else {
                renderLoggedOutNav();
            }
        } catch (error) {
            renderLoggedOutNav();
        }
    }

    function renderLoggedInNav(member) {
        document.getElementById('welcomeText').innerText = `${member.nickname}님 어서오세요!`;

        document.getElementById('loginBtn').classList.add('hidden');
        document.getElementById('editBtn').classList.remove('hidden');
        document.getElementById('logoutBtn').classList.remove('hidden');
    }

    function renderLoggedOutNav() {
        document.getElementById('welcomeText').innerText = 'Similia';

        document.getElementById('loginBtn').classList.remove('hidden');
        document.getElementById('editBtn').classList.add('hidden');
        document.getElementById('logoutBtn').classList.add('hidden');
    }

    function goHome() {
        location.href = '/index.html';
    }

    function goLogin() {
        location.href = '/login.html';
    }

    function goEdit() {
        location.href = '/member-edit.html';
    }

    async function logout() {
        try {
            const response = await fetch('/sessions', {
                method: 'DELETE',
                credentials: 'include'
            });

            if (response.ok) {
                location.href = '/index.html';
            } else {
                alert('로그아웃에 실패했습니다.');
            }
        } catch (error) {
            alert('오류가 발생했습니다.');
        }
    }
</script>

</body>
</html>
