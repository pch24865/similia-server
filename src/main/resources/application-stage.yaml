spring:
  datasource:
    # 스테이징 환경용 RDS 정보 (환경변수 주입)
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate # 스테이징에서는 스키마 자동 생성을 방지하고 검증만 수행
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.noplay.similia: INFO
