<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2d7ef7;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        button:hover {
            background: #1f68d6;
        }
        .sub-button {
            background: #666;
        }
        .sub-button:hover {
            background: #444;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            background: #eef4ff;
            white-space: pre-line;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>로그인</h2>

    <input type="email" id="email" placeholder="이메일">
    <input type="password" id="password" placeholder="비밀번호">

    <button onclick="login()">로그인</button>
    <button class="sub-button" onclick="location.href='/signup.html'">회원가입 하러가기</button>

    <div id="result" class="message" style="display:none;"></div>
</div>

<script>
    async function login() {
        const data = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const resultDiv = document.getElementById('result');

        try {
            const response = await fetch('/auth/tokens', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify(data)
            });

            resultDiv.style.display = 'block';

            if (response.ok) {
                const json = await response.json();
                localStorage.setItem('accessToken', json.accessToken); // JWT 저장
                
                resultDiv.innerText = '로그인 성공';
                setTimeout(() => {
                    location.href = '/index.html';
                }, 500);
            } else {
                const text = await response.text();
                resultDiv.innerText = '로그인 실패\n\n' + text;
            }
        } catch (error) {
            resultDiv.style.display = 'block';
            resultDiv.innerText = '오류 발생\n\n' + error;
        }
    }
</script>
</body>
</html>
