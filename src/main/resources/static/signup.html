<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2d7ef7;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #1f68d6;
        }
        .link-box {
            text-align: center;
            margin-top: 16px;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            background: #eef4ff;
            white-space: pre-line;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>회원가입</h2>

    <input type="email" id="email" placeholder="이메일">
    <input type="text" id="nickname" placeholder="닉네임">
    <input type="text" id="name" placeholder="이름">
    <input type="password" id="password" placeholder="비밀번호">
    <input type="password" id="confirmPassword" placeholder="비밀번호 확인">
    <input type="text" id="phone" placeholder="전화번호 (예: 010-1234-5678)">

    <button onclick="signUp()">회원가입</button>

    <div class="link-box">
        <a href="/login.html">로그인 페이지로 이동</a>
    </div>

    <div id="result" class="message" style="display:none;"></div>
</div>

<script>
    async function signUp() {
        const resultDiv = document.getElementById('result');

        const email = document.getElementById('email').value;
        const nickname = document.getElementById('nickname').value;
        const name = document.getElementById('name').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const phone = document.getElementById('phone').value;

        if (password !== confirmPassword) {
            resultDiv.style.display = 'block';
            resultDiv.innerText = '비밀번호와 비밀번호 확인이 일치하지 않습니다.';
            return;
        }

        const data = {
            email: email,
            nickname: nickname,
            name: name,
            password: password,
            phone: phone
        };

        try {
            const response = await fetch('/members/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const text = await response.text();

            resultDiv.style.display = 'block';

            if (response.ok) {
                resultDiv.innerText = '회원가입 성공';
                setTimeout(() => {
                    location.href = '/login.html';
                }, 700);
            } else {
                resultDiv.innerText = '회원가입 실패\n\n' + text;
            }
        } catch (error) {
            resultDiv.style.display = 'block';
            resultDiv.innerText = '오류 발생\n\n' + error;
        }
    }
</script>
</body>
</html>
